<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Candor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1d2230;
        --card: #262c3c;
        --fg: #f0f3f8;
        --muted: #8b94a6;
        --mint: #6fe7c1;
        --border: rgba(255, 255, 255, 0.08);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, "SF Pro Text", Inter, system-ui, sans-serif;
      }
      body {
        width: 380px;
        min-height: 480px;
      }
      header {
        padding: 16px 18px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .logo span {
        color: var(--mint);
      }
      .open-link {
        color: var(--muted);
        font-size: 11px;
        text-decoration: none;
      }
      .open-link:hover {
        color: var(--fg);
      }
      .actions {
        padding: 0 18px 12px;
      }
      .btn {
        width: 100%;
        background: var(--mint);
        color: #0e2a25;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .copied {
        margin-top: 8px;
        font-size: 11px;
        color: var(--mint);
        text-align: center;
        min-height: 14px;
      }
      .section-title {
        padding: 6px 18px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--muted);
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0 12px 12px;
      }
      li {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        margin: 6px 0;
        font-size: 13px;
        line-height: 1.5;
      }
      li .meta {
        margin-top: 6px;
        font-size: 10px;
        color: var(--muted);
      }
      .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--mint);
        margin-right: 6px;
        vertical-align: middle;
      }
      .empty {
        padding: 30px 18px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }
      .config {
        border-top: 1px solid var(--border);
        padding: 12px 18px;
        font-size: 11px;
        color: var(--muted);
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .config input {
        flex: 1;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--fg);
        padding: 4px 8px;
        font-size: 11px;
      }
      .config button {
        background: transparent;
        color: var(--mint);
        border: 0;
        cursor: pointer;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Candor<span>.</span></div>
      <a href="#" id="open-inbox" class="open-link">打开收件箱 →</a>
    </header>

    <div class="actions">
      <button class="btn" id="copy-link">复制我的收礼链接</button>
      <div class="copied" id="copied-msg"></div>
    </div>

    <div class="section-title">最近的建议</div>
    <ul id="feed"></ul>
    <div class="empty" id="empty" style="display: none">
      暂无反馈。<br />把链接发出去，礼物会自己来。
    </div>

    <div class="config">
      <span>站点：</span>
      <input id="origin" placeholder="https://your.lovable.app" />
      <button id="save-origin">保存</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
