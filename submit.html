<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发送反馈 - Candor</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .submit-container {
      width: 100%;
      max-width: 480px;
    }
    .submit-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .submit-header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .submit-header p {
      color: var(--muted);
    }
    .recipient-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
    }
    .recipient-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .recipient-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--mint);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .form-group textarea {
      width: 100%;
      min-height: 160px;
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      transition: border-color 0.15s ease;
    }
    .form-group textarea:focus {
      outline: none;
      border-color: var(--mint);
    }
    .form-group textarea::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }
    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
    }
    .privacy-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
    }
    .success-view {
      text-align: center;
      padding: 40px 20px;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .success-view h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .success-view p {
      color: var(--muted);
      margin-bottom: 24px;
    }
    .success-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .error-view {
      text-align: center;
      padding: 40px 20px;
    }
    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .error-view h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--error);
    }
    .error-view p {
      color: var(--muted);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Submit Form View -->
    <div id="submit-view" class="submit-container">
      <div class="submit-header">
        <h1>发送匿名反馈</h1>
        <p>一句真心话，胜过十句客套</p>
      </div>

      <div class="recipient-info">
        <div class="recipient-label">收件人</div>
        <div id="recipient-name" class="recipient-name">加载中...</div>
      </div>

      <form id="feedback-form">
        <div class="form-group">
          <label for="feedback-text">你的反馈</label>
          <textarea 
            id="feedback-text" 
            placeholder="写下你的真诚反馈...

可以包括：
• TA 做得好的地方
• 可以改进的建议
• 你最想告诉 TA 的一件事"
            maxlength="2000"
            required
          ></textarea>
          <div class="char-count"><span id="char-count">0</span> / 2000</div>
        </div>

        <button type="submit" class="btn btn-primary submit-btn">
          发送反馈 🚀
        </button>
      </form>

      <p class="privacy-note">
        🔒 完全匿名 · 不收集任何个人信息 · 直接送达对方本地收件箱
      </p>
    </div>

    <!-- Success View -->
    <div id="success-view" class="submit-container hidden">
      <div class="success-view">
        <div class="success-icon">✅</div>
        <h2>反馈已发送！</h2>
        <p>你的反馈已经安全送达对方的本地收件箱</p>
        <div class="success-actions">
          <button id="send-another" class="btn btn-primary">再发一条</button>
          <a href="#" id="install-link" class="btn btn-ghost">获取自己的收件箱</a>
        </div>
      </div>
    </div>

    <!-- Error View -->
    <div id="error-view" class="submit-container hidden">
      <div class="error-view">
        <div class="error-icon">⚠️</div>
        <h2>出错了</h2>
        <p id="error-message">无法找到收件人，请检查链接是否正确</p>
        <button id="retry-btn" class="btn btn-primary">重试</button>
      </div>
    </div>
  </div>

  <script src="submit.js"></script>
</body>
</html>
